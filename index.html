<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shreyan's Arc | DSA Roadmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            dark: {
              bg: '#191919',       // Notion page dark background
              card: '#202020',     // Notion card/menu background
              border: '#2e2e2e',   // Notion subtle border
              highlight: '#373737',// Notion hover state
              text: '#f1f1f1',     // Notion text color
              muted: '#9b9b9b',    // Notion muted gray
            },
            brand: {
              primary: '#3b82f6',      // Slate blue
              primaryHover: '#2563eb', // Active state
              secondary: '#6366f1',    // Indigo accent
              accent: '#10b981',       // Emerald (Completed state)
              danger: '#ef4444',       
              warning: '#f59e0b',      
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #191919;
      color: #f1f1f1;
      -webkit-font-smoothing: antialiased;
    }

    /* Minimal Dotted Grid Pattern */
    .grid-bg {
      background-image: radial-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #191919;
    }

    ::-webkit-scrollbar-thumb {
      background: #2e2e2e;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #373737;
    }

    /* Checkbox Animation */
    .checkbox-wrapper input:checked+div {
      background-color: #10b981;
      border-color: #10b981;
    }

    .checkbox-wrapper input:checked+div svg {
      display: block;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
