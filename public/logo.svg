<svg width="100%" height="100%" viewBox="7.5 -1 85 85" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand_gradient" x1="80" y1="20" x2="20" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- The Path: A smooth sigmoid curve representing the journey/arc -->
  <path d="M 25 75 C 50 75, 50 25, 75 25" 
        stroke="url(#brand_gradient)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Start Node (Bottom-Left) - Green (End of gradient flow) -->
  <circle cx="25" cy="75" r="8" fill="#10b981" />
  
  <!-- End Node (Top-Right) - Blue (Start of gradient flow) -->
  <circle cx="75" cy="25" r="8" fill="#3b82f6" />
</svg>
